function norm(t){
  return String(t||"").toLowerCase().replace(/\s+/g," ").replace(/[.,;:!?()«»"']/g,"").trim();
}

function shuffle(arr){
  const a=[...arr];
  for(let i=a.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}

function makeVariants(){
  const variants=[];
  for(let i=0;i<QS.length;i+=30){
    variants.push({
      title:"Вариант "+(variants.length+1),
      items:QS.slice(i,i+30)
    });
  }
  return variants;
}

const DATA=makeVariants();

function makeOptions(correct, variant){
  const sameVariantAnswers=variant.items.map(x=>x.a);
  const pool=[...new Set([...sameVariantAnswers,...EXTRA_OPTIONS])]
    .filter(x=>norm(x)!==norm(correct));
  return shuffle([correct,...shuffle(pool).slice(0,3)]);
}

function evidence(q,a){
  const text=norm(q+" "+a);

  if(text.includes("метатан") || text.includes("флейвел") || text.includes("өзін өзі реттеу")){
    return "Бұл жауап метатану және өзін-өзі реттеу ұғымдарымен байланысты. Метатану оқушының өз оқуын, ойлауын, түсінуін, бағалауын және реттеуін білдіреді.";
  }

  if(text.includes("бағалау") || text.includes("форматив") || text.includes("жиынтық") || text.includes("интерпретация") || text.includes("кері байланыс")){
    return "Бұл жауап бағалау үдерісіне қатысты. Бағалау оқушының білім деңгейін анықтау, нәтижені түсіндіру, кері байланыс беру және келесі оқу қадамын белгілеу үшін қолданылады.";
  }

  if(text.includes("сыни") || text.includes("сто") || text.includes("дәлел") || text.includes("пайым")){
    return "Бұл жауап сыни тұрғыдан ойлаумен байланысты. Сыни ойлау ақпаратты талдау, дәлелдерді бағалау, қорытынды жасау және өз пікірін негіздеу қабілетін көрсетеді.";
  }

  if(text.includes("диалог") || text.includes("әңгіме") || text.includes("мерсер") || text.includes("александер") || text.includes("барнс")){
    return "Бұл жауап диалогтік оқытуға қатысты. Диалог арқылы оқушылар пікір алмасады, дәлел келтіреді, бірлесіп ойлайды және білімін тереңдетеді.";
  }

  if(text.includes("выгот") || text.includes("жада") || text.includes("жақын арадағы даму")){
    return "Бұл жауап Л. Выготскийдің әлеуметтік-мәдени теориясымен байланысты. Жақын арадағы даму аймағы оқушының өз бетімен және көмек арқылы орындай алатын деңгейлерінің арасын білдіреді.";
  }

  if(text.includes("маслоу") || text.includes("роджерс") || text.includes("гуманист") || text.includes("өзін өзі таныта")){
    return "Бұл жауап гуманистік бағытпен байланысты. Маслоу мен Роджерс адамның тұлғалық өсуін, өзін-өзі танытуын және ішкі қажеттіліктерін маңызды деп қарастырған.";
  }

  if(text.includes("пиаге") || text.includes("когнитив")){
    return "Бұл жауап когнитивтік даму теориясымен байланысты. Пиаже баланың ойлау қабілеті мен танымдық дамуын зерттеген.";
  }

  if(text.includes("шульман") || text.includes("бас") || text.includes("қол") || text.includes("жүрек")){
    return "Бұл жауап Шульманның мұғалім құзыреттілігі туралы идеясымен байланысты. Оның тұжырымында кәсіби түсінік, тәжірибелік дағды және кәсіби тұтастық маңызды.";
  }

  if(text.includes("брунер") || text.includes("көпір") || text.includes("жаңалық ашу")){

  if(text.includes("уәж") || text.includes("ынта") || text.includes("мотива")){

  }

  if(text.includes("жады") || text.includes("есте") || text.includes("мнемоника") || text.includes("loci")){

function render(){
  const nav=document.getElementById("nav");
  const app=document.getElementById("app");

  nav.innerHTML=DATA.map((v,i)=>`<a href="#v${i+1}">${v.title}</a>`).join("");

  app.innerHTML=DATA.map((variant,vi)=>{
    const questions=variant.items.map((item,qi)=>{
      const opts=makeOptions(item.a,variant);
      item.options=opts;
      item.correctIndex=opts.findIndex(o=>norm(o)===norm(item.a));

      return `
        <div class="q">
          <div class="qtitle">${qi+1}. ${item.q}</div>
          ${opts.map((opt,oi)=>`
            <label class="opt">
              <input type="radio" name="v${vi}-q${qi}" value="${oi}">
              ${String.fromCharCode(65+oi)}) ${opt}
            </label>
          `).join("")}
        </div>
      `;
    }).join("");

    return `
      <section class="card" id="v${vi+1}">
        <div class="head">
          <div>
            <h2>${variant.title}</h2>
            <div class="desc">Бұл вариантта 30 сұрақ бар. Барлық сұраққа жауап беріп, соңында нәтижені көріңіз.</div>
          </div>
          <span class="badge">${variant.items.length} сұрақ</span>
        </div>
        ${questions}
        <button class="btn" onclick="checkVariant(${vi})">Нәтижені көрсету</button>
        <div class="result" id="result-${vi}"></div>
      </section>
    `;
  }).join("") + `
    <div class="footer">
      © @elnazm_ln — Бұл сайтты көшіруге, қайта сатуға және таратуға тыйым салынады.
    </div>
  `;
}

function checkVariant(vi){
  const variant=DATA[vi];
  const box=document.getElementById("result-"+vi);
  let score=0;
  let html="";

  variant.items.forEach((item,qi)=>{
    const selected=document.querySelector(`input[name="v${vi}-q${qi}"]:checked`);
    const selectedIndex=selected ? Number(selected.value) : -1;
    const ok=selectedIndex===item.correctIndex;

    if(ok) score++;

    const yourAnswer=selectedIndex>=0
      ? `${String.fromCharCode(65+selectedIndex)}) ${item.options[selectedIndex]}`
      : "Жауап таңдалмаған";

    const correctAnswer=`${String.fromCharCode(65+item.correctIndex)}) ${item.a}`;

    html+=`
      <div class="ans ${ok ? "ok" : "bad"}">
        <div><b>${qi+1}. ${item.q}</b></div>
        <div class="${ok ? "oktxt" : "badtxt"}">${ok ? "Дұрыс" : "Қате"}</div>

        <div class="ex">
          <b>Сіздің жауабыңыз:</b><br>${yourAnswer}
        </div>

        <div class="ex">
          <b>Дұрыс жауап:</b><br>${correctAnswer}
        </div>

        <div class="ex">
          <b>Түсіндірме / дәлел:</b><br>${evidence(item.q,item.a)}
        </div>
      </div>
    `;
  });

  const percent=Math.round(score/variant.items.length*100);

  box.innerHTML=`
    <div class="summary">
      <h3>${score} / ${variant.items.length} дұрыс</h3>
      <p>Нәтиже: <b>${percent}%</b></p>
    </div>
    ${html}
  `;

  box.scrollIntoView({behavior:"smooth",block:"start"});
}

render();

  const k=e.key.toUpperCase();
  if(
    e.key==="F12" ||
    (e.ctrlKey && e.shiftKey && ["I","J","C"].includes(k)) ||
    (e.ctrlKey && ["U","S","P","A","C"].includes(k))
  ){
    e.preventDefault();
  }
});
