const nav=document.getElementById('nav');
const app=document.getElementById('app');
DATA.forEach((variant,i)=>{
  const a=document.createElement('a');
  a.href='#v'+i;
  a.textContent=variant.title;
  nav.appendChild(a);
});

function render(){
  app.innerHTML='';
  DATA.forEach((variant,vi)=>{
    const section=document.createElement('section');
    section.className='card';
    section.id='v'+vi;
    section.innerHTML=`
      <div class="head">
        <div>
          <h2>${variant.title}</h2>
          <div class="desc">Выберите один правильный ответ в каждом вопросе. После проверки появятся результат, правильные ответы и объяснения.</div>
        </div>
        <div class="badge">30 вопросов</div>
      </div>
      <div class="questions"></div>
      <button class="btn" onclick="checkVariant(${vi})">Показать результат</button>
      <div class="result" id="res${vi}"></div>`;
    const qBox=section.querySelector('.questions');
    variant.items.forEach((item,qi)=>{
      const q=document.createElement('div');
      q.className='q';
      q.innerHTML=`<div class="qtitle">${item.n}. ${item.q}</div>` + item.options.map((opt,oi)=>`
        <label class="opt"><input type="radio" name="v${vi}q${qi}" value="${oi}">${opt}</label>`).join('');
      qBox.appendChild(q);
    });
    app.appendChild(section);
  });
  const footer=document.createElement('div');
  footer.className='footer';
  footer.textContent='© @elnazm_ln. Все права защищены.';
  app.appendChild(footer);
}

function checkVariant(vi){
  const variant=DATA[vi];
  let correct=0;
  let html='';
  variant.items.forEach((item,qi)=>{
    const selected=document.querySelector(`input[name="v${vi}q${qi}"]:checked`);
    const userIndex=selected ? Number(selected.value) : -1;
    const rightIndex=item.options.indexOf(item.a);
    const isOk=userIndex===rightIndex;
    if(isOk) correct++;
    const userAnswer=userIndex>=0 ? item.options[userIndex] : 'Ответ не выбран';
    html += `<div class="ans ${isOk?'ok':'bad'}">
      <div><b>${item.n}.</b> ${isOk?'<span class="oktxt">Правильно</span>':'<span class="badtxt">Неправильно</span>'}</div>
      <div><b>Ваш ответ:</b> ${userAnswer}</div>
      <div><b>Правильный ответ:</b> ${item.a}</div>
      <div class="ex"><b>Объяснение:</b> ${item.ex || ('Правильный ответ: '+item.a+'.')}</div>
    </div>`;
  });
  document.getElementById('res'+vi).innerHTML=`
    <div class="summary"><h3>${correct} / ${variant.items.length}</h3><div>Ваш результат по варианту.</div></div>
    ${html}`;
}
render();
